<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <title>Eventos - IFSP - Pirituba</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        iframe {
            border: none;
            display: block;
            width: 100%;
            overflow: hidden;
        }
        
        #cabecalho iframe {
            height: 260px;
        }
        
        footer iframe {
            height: 200px;
        }
        
        main {
            padding: 30px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: left;                /* Título alinhado à esquerda */
            color: #000000;
            margin-bottom: 25px;
            padding-left: 20px;
        }
        
        form {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 0;
        }
        
        fieldset {
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            background-color: #fff;
        }
        
        legend {
            font-weight: bold;
            color: #1B8C3C;
            font-size: 1.2em;
            padding: 0 10px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="radio"] {
            width: auto;
            margin-right: 5px;
            margin-bottom: 0;
        }
        
        input[type="color"] {
            height: 50px;
            padding: 5px;
        }
        
        input:focus, select:focus {
            border-color: #1B8C3C;
            outline: none;
            box-shadow: 0 0 5px rgba(27,140,60,0.2);
        }
        
        span {
            font-size: 0.9em;
            color: #666;
            display: block;
            margin-top: -10px;
            margin-bottom: 10px;
        }
        
        .radio-grupo {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .radio-grupo label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
        }
        
        /* Barras verdes para botões (com altura reduzida) */
        .barra-botao {
            background-color: #1B8C3C;
            width: 100%;
            padding: 15px 0;               /* Reduzido de 20px para 15px (20% menor) */
            text-align: center;
            margin: 0;
        }
        
        .barra-botao button {
            background-color: white;
            color: #1B8C3C;
            border: 2px solid white;
            padding: 11px 32px;            /* Reduzido em 20%: era 14px 40px */
            font-size: 14px;               /* Reduzido de 18px para 14px */
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 160px;              /* Reduzido proporcionalmente (era 200px) */
        }
        
        .barra-botao button:hover {
            background-color: #1B8C3C;
            color: white;
            border: 2px solid white;
        }
        
        .espaco-form-barra {
            height: 20px;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <header id="cabecalho">
        <iframe src="menu.html"></iframe>
    </header>

    <main>
        <h1>Inscreva-se</h1>
        
        <form method="POST">
            <fieldset>
                <label for="evento">Evento</label>
                <select name="assunto" id="evento" required>
                    <option value="">-- Selecione --</option>
                    <option value="voe">Voe sem asas</option>
                    <option value="jun">Festa junina</option>
                    <option value="inf">Semana de tecnologia</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Informações de Acesso</legend>
                <p>
                    <label for="inscrever-usuario">Usuário</label>
                    <input type="text" name="usuario" id="inscrever-usuario" required>
                </p>
                
                <p>
                    <label for="inscrever-senha">Senha</label>
                    <input type="password" name="senha" id="inscrever-senha" required>
                </p>
                
                <p>
                    <label for="inscrever-confirmar-senha">Confirme a Senha</label>
                    <input type="password" name="confirmar-senha" id="inscrever-confirmar-senha" required>
                </p>
            </fieldset>

            <fieldset>
                <legend>Informações Pessoais</legend>
                <p>
                    <label for="inscrever-nome">Nome Completo</label>
                    <input type="text" name="nome" id="inscrever-nome" required>
                </p>
                <p>
                    <label for="inscrever-email">E-mail</label>
                    <input type="email" name="email" id="inscrever-email" required>
                </p>
                <p>
                    <label for="inscrever-celular">Celular</label>
                    <input type="tel" name="celular" id="inscrever-celular" pattern="\([0-9]{2}\) [0-9]{4,6}-[0-9]{3,4}$">
                    <span>(99) 99999-9999</span>
                </p>

                <fieldset>
                    <legend>Sexo</legend>
                    <div class="radio-grupo">
                        <label for="inscrever-sexo-masc">
                            <input id="inscrever-sexo-masc" type="radio" name="sexo" value="M">
                            Masculino
                        </label>
                        
                        <label for="inscrever-sexo-fem">
                            <input id="inscrever-sexo-fem" type="radio" name="sexo" value="F">
                            Feminino
                        </label>
                    </div>
                </fieldset>

                <p>
                    <label for="inscrever-nascimento">Data de Nascimento</label>
                    <input type="date" name="nascimento" id="inscrever-nascimento">
                </p>
                <p>
                    <label for="inscrever-cor">Cor Favorita</label>
                    <input type="color" name="cor" id="inscrever-cor">
                </p>
                <p>
                    <label for="inscrever-github">Perfil no Github</label>
                    <input type="url" name="github" id="inscrever-github">
                </p>
            </fieldset>
        </form>
        
        <div class="espaco-form-barra"></div>
        
        <!-- Barra verde com botão Inscreva-se (FORA do formulário, tamanho reduzido) -->
        <div class="barra-botao">
            <button type="submit" onclick="document.querySelector('form').submit();">Inscreva-se</button>
        </div>
        
        <!-- Barra verde com botão Limpar (tamanho reduzido) -->
        <div class="barra-botao" style="margin-top: 2px;">
            <button type="reset" onclick="document.querySelector('form').reset();">Limpar</button>
        </div>
    </main>

    <footer>
        <iframe src="rodape.html"></iframe>
    </footer>

</body>
</html>
