<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <title>Sobre - IFSP - Pirituba</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        object {
            border: none;
            display: block;
            width: 100%;
            overflow: hidden;
        }
        
        #cabecalho object {
            height: 260px;
        }
        
        footer object {
            height: 200px;
        }
        
        main {
            padding: 30px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: left;
            color: #000000;
            margin-bottom: 25px;
            padding-left: 20px;
        }
        
        /* Estilo para conteúdo de texto */
        .conteudo-sobre {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            line-height: 1.8;
            font-size: 1.1em;
        }
        
        .conteudo-sobre p {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header id="cabecalho">
        <object data="menu.html"></object>
    </header>

    <main>
        <h1>Sobre</h1>
        
    </main>

    <footer>
        <object data="rodape.html"></object>
    </footer>

</body>
</html>
