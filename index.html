<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <title>HOME - IFSP - Pirituba</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        object {
            border: none;
            display: block;
            width: 100%;
            overflow: hidden;
        }
        
        #cabecalho object {
            height: 260px;
        }
        
        footer object {
            height: 200px;
        }
        
        .centralizar {
            text-align: center;
        }
        
        figure img {
            max-width: 100%;
            height: auto;
        }
        
        main {
            padding: 20px;
        }

        /* Borda dupla cinza escuro com largura reduzida */
        .borda-dupla {
            display: block;
            width: 90%;                   /* Largura menor que a página */
            padding: 10px 25px;
            border: 6px double #444;      /* Cinza escuro duplo */
            background-color: #f9f9f9;
            margin: 20px auto;            /* Centraliza o bloco */
            font-weight: bold;
            text-align: center;           /* Texto centralizado */
        }
    </style>
</head>
<body>

    <header id="cabecalho">
        <object data="menu.html"></object>
    </header>

    <main>
        <aside>
            <h1 class="centralizar">Acontece no IFSP!</h1>
            <figure class="centralizar">
                <img src="Imagens/SEJA_RARO.jpg" alt="Palestra Seja Raro" class="imagem-eliptica" style="width: 50%;">
            </figure>
        </aside>
        
        <p class="centralizar borda-dupla">
            Aniversário do IFSP - Pirituba - Palestra Augusto Aielo 
        </p>
        
        <h1 class="centralizar">Conheça os desafios de inovação</h1>
        
        <div class="centralizar">
            <iframe width="560" height="315" 
                    src="https://www.youtube.com/embed/5g5LQe3m8Po?si=ZEIo43CyHWXcaiZJ" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
            </iframe>
        </div>
    </main>

    <footer>
        <object data="rodape.html"></object>
    </footer>

</body>
</html>
