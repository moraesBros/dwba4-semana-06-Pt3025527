<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <title>HOME - IFSP - Pirituba</title>
    
    <style>
        /* Remove margens padrão do navegador */
        body {
            margin: 0;
            padding: 0;
        }

        /* Remove bordas e ajusta os objetos (menu e rodapé) */
        object {
            border: none;
            display: block;
            width: 100%;
            overflow: hidden;      /* Evita barras de rolagem */
        }
        
        /* Altura suficiente para o menu (nav + barra verde + logo) */
        #cabecalho object {
            height: 260px;         /* Ajuste fino: o menu completo cabe aqui */
        }
        
        /* Altura do rodapé */
        footer object {
            height: 200px;
        }
        
        /* Centraliza textos e imagens */
        .centralizar {
            text-align: center;
        }
        
        /* Imagens flexíveis */
        figure img {
            max-width: 100%;
            height: auto;
        }
        
        main {
            padding: 20px;
        }
    </style>
</head>
<body>

    <header id="cabecalho">
        <object data="menu.html"></object>
    </header>

    <main>
        <aside>
            <h1 class="centralizar">Acontece no IFSP!</h1>
            <figure class="centralizar">
                <img src="Imagens/SEJA_RARO.jpg" alt="Palestra Seja Raro" style="width: 50%;">
            </figure>
        </aside>
        
        <p class="centralizar borda-dupla">
    Aniversário do IFSP - Pirituba - Palestra Augusto Aielo
</p>
        <h1 class="centralizar">Conheça os desafios de inovação</h1>
        
        <div class="centralizar">
            <iframe width="560" height="315" 
                    src="https://www.youtube.com/embed/5g5LQe3m8Po?si=ZEIo43CyHWXcaiZJ" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
            </iframe>
        </div>
    </main>

    <footer>
        <object data="rodape.html"></object>
    </footer>

</body>
</html>
