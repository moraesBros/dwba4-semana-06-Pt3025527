<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        nav {
            background-color: #000000;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .menu-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        /* Links da esquerda */
        .menu-esquerda {
            display: flex;
            gap: 25px;
        }
        
        /* Links da direita */
        .links-direita {
            display: flex;
            gap: 25px;
        }
        
        /* Barra verde abaixo da barra preta */
        .barra-verde {
            background-color: #1B8C3C; /* Verde similar ao do logo do IFSP */
            width: 100%; /* Ocupa toda a largura da tela */
            height: 4px; /* Altura da barra verde */
            margin: 0; /* Remove margens */
        }
        
        /* Container do logo (FORA da nav, alinhado à esquerda) */
        .logo-container {
            max-width: 1200px;
            margin: 20px auto 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: flex-start; /* Alinha o logo à esquerda */
        }
        
        .logo-container img {
            max-width: 300px; /* Dobro do tamanho original */
            width: 300px;
            height: auto;
            border-radius: 8px;
        }
        
        /* Estilo para todos os links */
        .menu-esquerda a, .links-direita a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        
        /* Efeito hover para todos os links */
        .menu-esquerda a:hover, .links-direita a:hover {
            background-color: #e74c3c;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .menu-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .menu-esquerda, .links-direita {
                width: 100%;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .logo-container {
                justify-content: center; /* Centraliza o logo no mobile */
            }
            
            .logo-container img {
                max-width: 200px; /* Tamanho reduzido no mobile */
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="menu-container">
            <!-- Links da ESQUERDA -->
            <div class="menu-esquerda">
                <a href="index.html">Home</a>
                <a href="eventos.html">Eventos</a>
                <a href="contato.html">Contato</a>
                <a href="cursos.html">Cursos</a>
                <a href="entrar.html">Entrar</a>
            </div>
            
            <!-- Links da DIREITA -->
            <div class="links-direita">
                <a href="sobre.html">Sobre</a>
            </div>
        </div>
    </nav>
    
    <!-- Barra verde de ponta a ponta -->
    <div class="barra-verde"></div>
    
    <!-- Logo FORA da barra preta, alinhado à esquerda (abaixo do Home) -->
    <div class="logo-container">
        <img src="Imagens/logo.jpg" alt="Logo IFSP">
    </div>
</body>
</html>
