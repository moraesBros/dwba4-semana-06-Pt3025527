<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        nav {
            background-color: #000000;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .menu-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        /* Links da esquerda */
        .menu-esquerda {
            display: flex;
            gap: 25px;
        }
        
        /* Container da direita (links + logo) */
        .menu-direita {
            display: flex;
            flex-direction: column;  /* Muda para coluna (vertical) */
            align-items: flex-end;   /* Alinha o conteúdo à direita */
            gap: 10px;               /* Espaço entre os links e a logo */
        }
        
        /* Links da direita */
        .links-direita {
            display: flex;
            gap: 25px;
        }
        
        /* Estilo do logo */
        .logo-direita {
            margin-top: 5px;
        }
        
        .logo-direita img {
            max-width: 150px;
            height: auto;
            border-radius: 8px;
        }
        
        /* Estilo para todos os links */
        .menu-esquerda a, .links-direita a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        
        /* Efeito hover para todos os links */
        .menu-esquerda a:hover, .links-direita a:hover {
            background-color: #e74c3c;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .menu-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .menu-esquerda, .menu-direita {
                width: 100%;
            }
            
            .menu-direita {
                align-items: center;
            }
            
            .links-direita {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .logo-direita {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="menu-container">
            <!-- Links da ESQUERDA -->
            <div class="menu-esquerda">
                <a href="index.html">Home</a>
                    <a href="eventos.html">Eventos</a>
                    <a href="contato.html">Contato</a>
                    <a href="cursos.html">Cursos</a>
                    <a href="entrar.html">Entrar</a>
            </div>
            
            <!-- Conteúdo da DIREITA (links + logo) -->
            <div class="menu-direita">
                <div class="links-direita">
                    <a href="sobre.html">Sobre</a>
                </div>
                
                <!-- Logo abaixo dos links -->
                <div class="logo-direita">
                    <img src="Imagens/logo.jpg" alt="Logo IFSP">
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
