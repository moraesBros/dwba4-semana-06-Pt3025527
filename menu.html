<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        nav {
            background-color: #000000;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .menu-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Isso separa os itens (esquerda e direita) */
            padding: 0 20px;
        }
        
        /* Links da esquerda */
        .menu-esquerda {
            display: flex;
            gap: 25px;
        }
        
        /* Links da direita */
        .menu-direita {
            display: flex;
            gap: 25px;
        }
        
        /* Estilo para todos os links (mantém a mesma aparência) */
        .menu-esquerda a, .menu-direita a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        
        /* Efeito hover para todos os links */
        .menu-esquerda a:hover, .menu-direita a:hover {
            background-color: #e74c3c;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .menu-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .menu-esquerda, .menu-direita {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="menu-container">
            <!-- Links da ESQUERDA (Sobre fica aqui, próximo à borda) -->
            <div class="menu-esquerda">
                <a href="sobre.html">Sobre</a>
            </div>
            
            <!-- Links da DIREITA (demais links) -->
            <div class="menu-direita">
                <a href="index.html">Home</a>
                <a href="eventos.html">Eventos</a>
                <a href="contato.html">Contato</a>
                <a href="cursos.html">Cursos</a>
                <a href="entrar.html">Entrar</a>
            </div>
        </div>
    </nav>
</body>
</html>
