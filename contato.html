<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <title>Contato - IFSP - Pirituba</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        object {
            border: none;
            display: block;
            width: 100%;
            overflow: hidden;
        }
        
        #cabecalho object {
            height: 260px;
        }
        
        footer object {
            height: 200px;
        }
        
        main {
            padding: 30px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: left;
            color: #000000;
            margin-bottom: 25px;
            padding-left: 20px;
        }
        
        form {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }
        
        fieldset {
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            background-color: #fff;
        }
        
        legend {
            font-weight: bold;
            color: #1B8C3C;
            font-size: 1.2em;
            padding: 0 10px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #1B8C3C;
            outline: none;
            box-shadow: 0 0 5px rgba(27,140,60,0.2);
        }
        
        button {
            background-color: #1B8C3C;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            transition: background-color 0.3s;
        }
        
        button[type="reset"] {
            background-color: #555;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        .botoes {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header id="cabecalho">
        <object data="menu.html"></object>
    </header>

    <main>
        <h1>Mande uma mensagem</h1>
        
        <form method="POST">
            <fieldset>
                <legend>Seus Dados</legend>
                
                <label for="contato-nome">Nome</label>
                <input type="text" name="nome" id="contato-nome" required>
                
                <label for="contato-email">E-mail</label>
                <input type="email" name="email" id="contato-email" required>
                
                <label for="contato-telefone">Telefone</label>
                <input type="tel" name="telefone" id="contato-telefone" placeholder="(99) 99999-9999">
            </fieldset>

            <fieldset>
                <legend>Mensagem</legend>
                
                <label for="contato-assunto">Assunto</label>
                <select name="assunto" id="contato-assunto" required>
                    <option value="">-- Selecione --</option>
                    <option value="re">Reclamação</option>
                    <option value="su">Sugestão</option>
                    <option value="el">Elogio</option>
                </select>

                <label for="contato-mensagem">Mensagem</label>
                <textarea name="mensagem" id="contato-mensagem" rows="5" required></textarea>
            </fieldset>

            <div class="botoes">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
    </main>

    <footer>
        <object data="rodape.html"></object>
    </footer>

</body>
</html>
